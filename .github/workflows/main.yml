name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: sacms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/sacms_test?schema=public
      NEXTAUTH_SECRET: testing-secret-key-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3000
      UPSTASH_REDIS_REST_URL: https://mock.upstash.io
      UPSTASH_REDIS_REST_TOKEN: mock-token
      R2_ACCOUNT_ID: mock
      R2_ACCESS_KEY_ID: mock
      R2_SECRET_ACCESS_KEY: mock
      R2_BUCKET_NAME: mock
      R2_PUBLIC_URL: https://mock.r2.dev
      MIDTRANS_SERVER_KEY: mock
      MIDTRANS_CLIENT_KEY: mock

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate & Migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Run Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Unit Tests
        run: npm run test

      - name: Build Next.js App
        run: npm run build
